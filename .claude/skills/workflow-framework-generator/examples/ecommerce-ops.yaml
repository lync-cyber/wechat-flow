# Example Manifest: E-commerce Operations Workflow
# Generated by: workflow-framework-generator
# Target: Cursor

workflow_name: "电商运营数据驱动工作流"
domain: ecommerce-operations
platform_id: cursor
project_name: ecommerce-ops-workflow

constraints:
  multi_agent: true
  tool_calls: true
  structured_output: true
  output_format: markdown

agents:
  - id: orchestrator
    name: "运营编排者"
    role: "协调市场分析、选品、文案和投放全流程"
    capabilities: [file_read, file_write, file_edit, file_glob, file_grep, shell_exec, agent_dispatch]
    max_turns: 150

  - id: market-analyst
    name: "市场分析师"
    role: "收集市场数据，分析竞品和趋势"
    capabilities: [file_read, file_write, web_search, shell_exec]
    max_turns: 80

  - id: product-selector
    name: "选品专员"
    role: "基于市场数据评估商品潜力，生成选品推荐"
    capabilities: [file_read, file_write, file_edit]
    max_turns: 60

  - id: copywriter
    name: "营销文案"
    role: "为选定商品创作营销文案和广告创意"
    capabilities: [file_read, file_write, file_edit]
    max_turns: 80

  - id: data-analyst
    name: "数据分析师"
    role: "分析运营数据，生成优化建议报告"
    capabilities: [file_read, file_write, shell_exec, file_grep]
    max_turns: 80

skills:
  - id: market-research
    name: "市场调研"
    type: instructional
    description: "市场数据采集与竞品分析"
    used_by: [market-analyst]

  - id: product-analysis
    name: "商品分析"
    type: instructional
    description: "商品数据评估与选品推荐"
    used_by: [product-selector]

  - id: copy-gen
    name: "文案生成"
    type: instructional
    description: "营销文案批量生成与A/B测试变体"
    used_by: [copywriter]

  - id: data-report
    name: "数据报告"
    type: hybrid
    description: "运营数据分析与可视化报告生成"
    used_by: [data-analyst]

workflow:
  id: ecommerce-ops
  phases:
    - id: market-research
      name: "市场调研"
      agent: market-analyst
      skills: [market-research]
      inputs:
        - type: user_input
          source: "品类方向、竞品列表、目标市场"
      outputs:
        - type: file
          path: "docs/research/market-report.md"
          format: markdown
      transitions:
        on_success: product-selection
        on_revision: market-research
        on_blocked: halt

    - id: product-selection
      name: "商品选品"
      agent: product-selector
      skills: [product-analysis]
      inputs:
        - type: file
          source: "docs/research/market-report.md"
      outputs:
        - type: file
          path: "docs/products/selection-report.md"
          format: markdown
      gate:
        type: manual
        criteria: "用户确认选品列表"
      transitions:
        on_success: copy-creation
        on_revision: product-selection
        on_blocked: halt

    - id: copy-creation
      name: "文案创作"
      agent: copywriter
      skills: [copy-gen]
      inputs:
        - type: file
          source: "docs/products/selection-report.md"
      outputs:
        - type: file
          path: "docs/content/product-copies.md"
          format: markdown
      transitions:
        on_success: data-analysis
        on_revision: copy-creation
        on_blocked: halt

    - id: data-analysis
      name: "数据分析"
      agent: data-analyst
      skills: [data-report]
      inputs:
        - type: file
          source: "docs/content/product-copies.md"
        - type: file
          source: "docs/research/market-report.md"
      outputs:
        - type: file
          path: "docs/analytics/performance-report.md"
          format: markdown
      transitions:
        on_success: done
        on_blocked: halt

constants:
  MAX_QUESTIONS_PER_BATCH: 3
  MAX_REVISION_CYCLES: 2
  MAX_COPY_VARIANTS: 5

features: {}
