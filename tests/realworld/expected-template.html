<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{THEME}} / {{SAMPLE}} — 微信渲染对照页</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
  .container { max-width: 960px; margin: 0 auto; }
  h1.page-title { font-size: 18px; color: #333; margin-bottom: 20px; }
  .meta { font-size: 12px; color: #999; margin-bottom: 20px; }
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .panel-title { font-size: 13px; font-weight: 600; color: #666; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
  .content { font-size: 14px; line-height: 1.8; word-break: break-word; }
  .stats { margin-top: 16px; padding: 10px; background: #f9f9f9; border-radius: 4px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <h1 class="page-title">微信渲染对照页 — 主题: {{THEME}} / 样本: {{SAMPLE}}</h1>
  <p class="meta">生成时间: {{GENERATED_AT}} | 命中规则数: {{RULE_COUNT}} | dropped 属性: {{DROPPED_COUNT}}</p>
  <div class="columns">
    <div class="panel">
      <p class="panel-title">渲染后 HTML（粘贴前）</p>
      <div class="content">{{RENDERED_HTML}}</div>
      <div class="stats">字节数: {{RENDERED_BYTES}}</div>
    </div>
    <div class="panel">
      <p class="panel-title">模拟粘贴后 HTML（微信过滤后）</p>
      <div class="content">{{PASTED_HTML}}</div>
      <div class="stats">dropped 属性列表: {{DROPPED_ATTRS}}</div>
    </div>
  </div>
</div>
</body>
</html>
