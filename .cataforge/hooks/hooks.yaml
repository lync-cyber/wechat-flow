# CataForge Hook 规范定义（平台无关）
# deploy 读取此文件 + 平台 profile 的 event_map/matcher_map 生成平台配置
#
# schema_version: 规范结构版本号（向前不兼容时递增）
#   v1 — 初始：hooks / degradation_templates
#   v2 — 新增：matcher_file_pattern / matcher_command_pattern / matcher_agent_id
#        （可选；旧 hooks.yaml 省略时行为等同 v1）

schema_version: 2

hooks:
  PreToolUse:
    - matcher_capability: shell_exec
      script: guard_dangerous
      type: block
      description: "危险命令拦截"
      safety_critical: true
    - matcher_capability: agent_dispatch
      script: log_agent_dispatch
      type: observe
      description: "子代理调度审计"

  PostToolUse:
    - matcher_capability: agent_dispatch
      script: validate_agent_result
      type: observe
      description: "子代理返回值验证"
    - matcher_capability: file_edit
      script: lint_format
      type: observe
      description: "文件编辑后自动格式化"
    - matcher_capability: user_question
      script: detect_correction
      type: observe
      description: "用户纠正信号捕获 (option-override)"
    - matcher_capability: agent_dispatch
      script: detect_review_flag
      type: observe
      description: "审查纠正信号捕获 (review-flag: reviewer 将 [ASSUMPTION] 判为 CRITICAL/HIGH)"
      matcher_agent_id: [reviewer]

  Stop:
    - script: notify_done
      type: observe
      description: "会话结束通知"

  Notification:
    - script: notify_permission
      type: observe
      description: "权限请求通知"

  SessionStart:
    - script: session_context
      type: observe
      description: "会话初始化 + deploy 同步"

degradation_templates:
  guard_dangerous:
    strategy: rules_injection
    content: |
      SAFETY RULES (auto-generated — platform lacks PreToolUse hook):
      - NEVER run rm -rf, DROP TABLE, or other destructive commands without explicit user confirmation
      - NEVER modify files outside the project directory

  validate_agent_result:
    strategy: prompt_checklist
    content: |
      === 返回值自检 ===
      返回前请确认:
      - [ ] 包含 <agent-result> 标签
      - [ ] status 为有效枚举值
      - [ ] outputs 列出所有产出文件路径

  detect_correction:
    strategy: skip
    reason: "纠正学习为非关键功能"

  detect_review_flag:
    strategy: skip
    reason: "纠正学习为非关键功能 (review-flag 信号)"

  notify_permission:
    strategy: skip
    reason: "通知为非关键功能"

  log_agent_dispatch:
    strategy: prompt_instruction
    content: |
      调度完成后，请运行（审计日志为 observe 类最佳努力行为，失败不应阻断流程；
      任何非 0 退出仅作 stderr 警告，无需重试）:
      cataforge event log --event agent_dispatch --phase {当前阶段} --agent {被调度Agent} --detail "调度 {被调度Agent}" || true

  lint_format:
    strategy: skip
    reason: "格式化为非关键功能"

  notify_done:
    strategy: skip
    reason: "会话结束通知为非关键功能"

  session_context:
    strategy: skip
    reason: "会话上下文初始化可降级"
