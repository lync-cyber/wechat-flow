platform_id: claude-code
display_name: Claude Code
version_tested: "2.1"

tool_map:
  file_read: Read
  file_write: Write
  file_edit: Edit
  file_glob: Glob
  file_grep: Grep
  shell_exec: Bash
  web_search: WebSearch
  web_fetch: WebFetch
  user_question: AskUserQuestion
  agent_dispatch: Agent

extended_capabilities:
  notebook_edit: NotebookEdit
  browser_preview: preview_start   # via MCP: Claude Preview (preview_screenshot, preview_click, etc.)
  image_input: Read                # Read tool handles images natively
  code_review: null                # no dedicated review tool; uses skills/agents

agent_definition:
  format: yaml-frontmatter
  scan_dirs:
    - .claude/agents
  needs_deploy: true

skill_definition:
  # Claude Code discovers project skills under .claude/skills/.  We expose the
  # canonical sources in .cataforge/skills/ via junction (Windows) / symlink
  # (Unix) so edits round-trip without a re-deploy.
  target_dir: .claude/skills
  needs_deploy: true

command_definition:
  # Slash commands: each .md file in .claude/commands/ becomes /<name>.
  target_dir: .claude/commands
  needs_deploy: true

agent_config:
  supported_fields:
    - name
    - description
    - tools
    - disallowedTools
    - model
    - permissionMode
    - maxTurns
    - skills
    - mcpServers
    - hooks
    - memory
    - background
    - effort
    - isolation
    - color
    - initialPrompt
    - prompt
  memory_scopes: [user, project, local]
  isolation_modes: [worktree]

instruction_file:
  reads_claude_md: false
  targets:
    - type: project_state_copy
      path: CLAUDE.md
      # section-merge 策略按 § 章节保留用户改动;
      # on_conflict=overwrite 仍是默认, 若想额外启用"用户手工编辑则跳过"可改为 preserve_if_edited。
      update_strategy: section-merge
      section_policy:
        framework: [文档导航, 框架机制]
        schema:    [项目信息, 全局约定]
        runtime:   [项目状态, 执行环境]
        user_extensible: true
        always_overwrite_fields:
          项目信息: [运行时]
  additional_outputs: []

dispatch:
  tool_name: Agent
  is_async: false
  params: [subagent_type, prompt, description]

hooks:
  config_format: json
  config_path: .claude/settings.json
  # Claude Code's hook schema only recognises "type: command" for each hook
  # entry (see https://docs.claude.com/en/docs/claude-code/hooks).  Internal
  # CataForge type tags (block / observe) are dropped at the bridge boundary.
  entry_type: command
  event_map:
    PreToolUse: PreToolUse
    PostToolUse: PostToolUse
    Stop: Stop
    SessionStart: SessionStart
    Notification: Notification
  matcher_map:
    Bash: Bash
    Agent: Agent
    "Edit|Write": "Edit|Write"
    AskUserQuestion: AskUserQuestion
  degradation:
    guard_dangerous: native
    log_agent_dispatch: native
    validate_agent_result: native
    lint_format: native
    detect_correction: native
    detect_review_flag: native
    notify_done: native
    notify_permission: native
    session_context: native

features:
  cloud_agents: false
  agent_teams: true              # experimental — CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
  parallel_agents: true          # up to 10 concurrent subagents
  scheduled_tasks: true          # CronCreate, ScheduleWakeup, RemoteTrigger
  background_agents: true
  plan_mode: true                # EnterPlanMode / ExitPlanMode
  computer_use: false            # available via MCP only, not native
  realtime_voice: false
  multi_model: true              # opus / sonnet / haiku + full model IDs
  session_resume: false
  worktree_isolation: true       # isolation: worktree in agent frontmatter
  autonomy_slider: false
  ci_cd_integration: false
  multi_root: false
  agent_memory: true             # memory: user/project/local in agent frontmatter
  plugin_marketplace: true       # plugin system with marketplace
  context_management: true       # chapter marking, auto-compression

permissions:
  modes: [default, acceptEdits, auto, dontAsk, bypassPermissions, plan]

model_routing:
  available_models: [opus, sonnet, haiku]
  per_agent_model: true
  user_resolved: false
  # Tier → native model id map. Source AGENT.md uses platform-agnostic
  # `model_tier: light | standard | heavy`; deploy resolves to these names.
  tier_map:
    light: haiku
    standard: sonnet
    heavy: opus

context_injection:
  # Claude Code 自动注入 CLAUDE.md 到每次会话；@-mention 也是 eager（启动即入上下
  # 文），因此 preamble 仅放必读且短的 COMMON-RULES，避免常驻 token 膨胀。
  auto_injection:
    mechanism: claude_md
    eager: true
    size_limit_bytes: null
    preamble_files:
      - .cataforge/rules/COMMON-RULES.md
  inline_file_syntax:
    kind: at_mention
    template: "@{path}"
  rules_distribution:
    target: .claude/rules
    format: markdown
    activation: manual_read
