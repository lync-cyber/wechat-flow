platform_id: codex
display_name: Codex CLI
version_tested: "2026.04"

tool_map:
  file_read: shell
  file_write: apply_patch
  file_edit: apply_patch
  file_glob: shell
  file_grep: shell
  shell_exec: shell
  web_search: web_search
  web_fetch: shell
  user_question: null
  agent_dispatch: spawn_agent

extended_capabilities:
  notebook_edit: null
  browser_preview: null
  image_input: image             # -i flag / paste screenshots
  code_review: review            # /review command, dedicated reviewer

agent_definition:
  format: toml
  scan_dirs:
    - .codex/agents
  needs_deploy: true

skill_definition:
  # Codex has no native skills surface — leave disabled.
  needs_deploy: false

command_definition:
  # Codex slash commands: deferred until Codex exposes a stable command
  # directory contract. Track: docs/architecture/platform-adaptation.md
  # §Codex limitations.
  needs_deploy: false

agent_config:
  supported_fields:
    - name
    - description
    - model
    - model_reasoning_effort
    - sandbox_mode
    - nickname_candidates
  memory_scopes: []
  isolation_modes: []

instruction_file:
  reads_claude_md: false
  targets:
    - type: project_state_copy
      path: AGENTS.md
      # 三平台 (cursor/codex/opencode) 共享 AGENTS.md — section-merge +
      # always_overwrite_fields.运行时 确保当前平台 deploy 时'运行时:' 字段
      # 反映当前平台, 不被前一次其他平台的 deploy 抢占。
      update_strategy: section-merge
      section_policy:
        framework: [文档导航, 框架机制]
        schema:    [项目信息, 全局约定]
        runtime:   [项目状态, 执行环境]
        user_extensible: true
        always_overwrite_fields:
          项目信息: [运行时]
  additional_outputs: []

dispatch:
  tool_name: spawn_agent
  is_async: true
  params: [agent, fork_context, prompt]

hooks:
  config_format: json
  config_path: .codex/hooks.json
  # Codex hooks.json schema uses "type: command" for each hook entry.
  entry_type: command
  event_map:
    PreToolUse: PreToolUse
    PostToolUse: PostToolUse
    Stop: Stop
    SessionStart: SessionStart
    Notification: null
  # Codex hook PreToolUse/PostToolUse matchers currently only support "Bash"
  tool_overrides:
    shell_exec: Bash           # Hook event uses "Bash" not "shell"
  matcher_map:
    Bash: Bash
    Agent: null
    "Edit|Write": null
    AskUserQuestion: null
  degradation:
    guard_dangerous: native        # PreToolUse + Bash matcher supported
    log_agent_dispatch: degraded   # PreToolUse but no agent matcher
    validate_agent_result: degraded # PostToolUse but no agent matcher
    lint_format: degraded          # PostToolUse but no edit matcher
    detect_correction: degraded    # no user_question
    detect_review_flag: degraded   # PostToolUse but no agent matcher (mirrors validate_agent_result)
    notify_done: native            # Stop event, no matcher needed
    notify_permission: degraded    # no Notification event
    session_context: native        # SessionStart event, no matcher needed

features:
  cloud_agents: true             # codex cloud — background parallel tasks
  agent_teams: false
  parallel_agents: true          # cloud parallel with --attempts best-of-N
  scheduled_tasks: false
  background_agents: true
  plan_mode: false
  computer_use: true             # native computer use capability
  realtime_voice: true           # WebRTC v2 voice sessions
  multi_model: true              # /model command, mid-session switch
  session_resume: true           # /resume, codex resume
  worktree_isolation: false
  autonomy_slider: false
  ci_cd_integration: false
  multi_root: true               # --add-dir multi-project workspace
  agent_memory: false            # only via MCP (e.g. Basic Memory)
  plugin_marketplace: true       # installable plugin bundles
  context_management: false

permissions:
  modes: [auto, read_only, full_access]

model_routing:
  available_models: [gpt-5.4, gpt-5.3-codex-spark]
  per_agent_model: false
  user_resolved: false
  # Codex selects model session-globally; deploy never writes a per-agent
  # `model:`. tier_map kept for documentation parity with other platforms
  # and for future use should Codex add per-agent routing.
  tier_map:
    light: gpt-5.3-codex-spark
    standard: gpt-5.4
    heavy: gpt-5.4

context_injection:
  # Codex 合并 AGENTS.md（32KiB 上限），无 @ 语法；子代理 fork_context=false 时
  # 不继承主上下文，因此 AGENT.md / dispatch-prompt 必须显式指示 Read。
  auto_injection:
    mechanism: agents_md
    eager: true
    size_limit_bytes: 32768
    preamble_files: []
  inline_file_syntax:
    kind: read_tool
    template: "请先 Read {path}"
  rules_distribution:
    target: .codex/rules
    format: markdown
    activation: manual_read
