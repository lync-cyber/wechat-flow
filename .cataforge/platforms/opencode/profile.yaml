platform_id: opencode
display_name: OpenCode
version_tested: "1.3"

tool_map:
  file_read: read
  file_write: write
  file_edit: edit
  file_glob: glob
  file_grep: grep
  shell_exec: bash
  web_search: websearch
  web_fetch: webfetch
  user_question: question
  agent_dispatch: task

extended_capabilities:
  notebook_edit: null
  browser_preview: null
  image_input: image             # drag-and-drop image analysis
  code_review: null

agent_definition:
  format: yaml-frontmatter
  scan_dirs:
    - .opencode/agents
    - .claude/agents
  needs_deploy: true

skill_definition:
  # OpenCode has no distinct skills surface — skills flow in via AGENTS.md
  # reference to .cataforge/rules/.
  needs_deploy: false

command_definition:
  # OpenCode uses JS/TS plugin commands, not markdown files.
  needs_deploy: false

agent_config:
  supported_fields:
    - name
    - description
    - tools
    - model
  memory_scopes: []
  isolation_modes: []

instruction_file:
  reads_claude_md: false
  targets:
    - type: project_state_copy
      path: AGENTS.md
      # 三平台 (cursor/codex/opencode) 共享 AGENTS.md — section-merge +
      # always_overwrite_fields.运行时 确保当前平台 deploy 时'运行时:' 字段
      # 反映当前平台, 不被前一次其他平台的 deploy 抢占。
      update_strategy: section-merge
      section_policy:
        framework: [文档导航, 框架机制]
        schema:    [项目信息, 全局约定]
        runtime:   [项目状态, 执行环境]
        user_extensible: true
        always_overwrite_fields:
          项目信息: [运行时]
  additional_outputs: []

dispatch:
  tool_name: task
  is_async: false
  params: [subagent_type, description, prompt]

hooks:
  # OpenCode uses a JS/TS plugin system for hooks, not JSON config files.
  # CataForge materialises a single .opencode/plugins/cataforge-hooks.ts
  # wrapper that spawns the same Python scripts used by every other platform.
  # See OpenCodeAdapter.emit_plugin_hooks for the generator.
  config_format: plugin
  # config_path is unset — the adapter writes the plugin itself rather than
  # going through the JSON hook merger used by other platforms.
  event_map:
    PreToolUse: tool.execute.before
    PostToolUse: tool.execute.after
    Stop: session.idle
    SessionStart: session.created
    Notification: null
  tool_overrides: {}
  matcher_map: {}
  degradation:
    # All hooks are plugin-backed: the emitted TS wrapper invokes the Python
    # script so block/observe semantics flow through as on JSON platforms.
    guard_dangerous: native
    log_agent_dispatch: native
    validate_agent_result: native
    lint_format: native
    detect_correction: native
    detect_review_flag: native
    notify_done: native
    notify_permission: degraded     # OpenCode has no Notification event
    session_context: native

features:
  cloud_agents: false
  agent_teams: false
  parallel_agents: false
  scheduled_tasks: false
  background_agents: false
  plan_mode: true                # Plan mode (suggest without changes)
  computer_use: false
  realtime_voice: false
  multi_model: true              # 75+ providers via Models.dev
  session_resume: true           # Git-backed session review
  worktree_isolation: false
  autonomy_slider: false
  ci_cd_integration: true        # opencode github install/run
  multi_root: false
  agent_memory: false
  plugin_marketplace: true       # npm + local plugins
  context_management: false

permissions:
  modes: [default]

model_routing:
  available_models: []           # provider-agnostic — 75+ models via Models.dev
  per_agent_model: true
  # OpenCode users pick the model at runtime via Models.dev; pinning a
  # provider/model name in the deployed agent file would override that
  # choice. user_resolved=true tells the deploy adapter to omit `model:`.
  user_resolved: true
  tier_map: {}

context_injection:
  # OpenCode 原生支持 opencode.json.instructions 字段声明额外指令文件列表（含
  # glob 与远程 URL），比让 LLM 自己 Read 更省 token。OpenCodeAdapter 在
  # deploy_instruction_files 中写入这里声明的 files。
  auto_injection:
    mechanism: opencode_instructions
    eager: true
    size_limit_bytes: null
    preamble_files: []
  inline_file_syntax:
    kind: read_tool
    template: "请先 read {path}"
  rules_distribution:
    target: opencode.json
    format: markdown
    activation: opencode_instructions
    files:
      - AGENTS.md
      - .cataforge/rules/*.md
