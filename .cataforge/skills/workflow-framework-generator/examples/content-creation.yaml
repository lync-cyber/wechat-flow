# Example Manifest: Content Creation Workflow (WeChat Public Account)
# Generated by: workflow-framework-generator
# Target: Claude Code

workflow_name: "公众号内容创作工作流"
domain: content-creation
platform_id: claude-code
project_name: wechat-content-workflow

constraints:
  multi_agent: true
  tool_calls: true
  structured_output: true
  output_format: markdown

agents:
  - id: orchestrator
    name: "内容编排者"
    role: "管理内容创作全流程，协调各Agent按序执行"
    capabilities: [file_read, file_write, file_edit, file_glob, file_grep, shell_exec, agent_dispatch, user_question]
    max_turns: 150

  - id: planner
    name: "选题策划"
    role: "分析目标受众，确定选题方向和内容策略"
    capabilities: [file_read, file_write, web_search, user_question]
    max_turns: 50

  - id: researcher
    name: "素材调研"
    role: "收集选题相关的素材、数据和案例"
    capabilities: [file_read, file_write, web_search, web_fetch]
    max_turns: 80

  - id: writer
    name: "内容撰写"
    role: "根据大纲和素材撰写文章正文"
    capabilities: [file_read, file_write, file_edit]
    max_turns: 100

  - id: editor
    name: "内容编辑"
    role: "审核和修改文章的结构、逻辑、文风"
    capabilities: [file_read, file_write, file_edit]
    max_turns: 60

  - id: publisher
    name: "排版发布"
    role: "将文章转换为微信公众号排版格式"
    capabilities: [file_read, file_write, shell_exec]
    max_turns: 30

skills:
  - id: content-plan
    name: "内容规划"
    type: instructional
    description: "分析受众画像和热点趋势，生成选题方案和内容大纲"
    used_by: [planner]

  - id: content-gen
    name: "内容生成"
    type: instructional
    description: "按照大纲和风格指南生成结构化文章内容"
    used_by: [writer]

  - id: content-edit
    name: "内容编辑"
    type: instructional
    description: "检查文章的结构完整性、逻辑连贯性和文风一致性"
    used_by: [editor]

  - id: format-convert
    name: "格式转换"
    type: hybrid
    description: "将Markdown内容转换为微信公众号HTML排版格式"
    used_by: [publisher]

workflow:
  id: wechat-content
  phases:
    - id: planning
      name: "选题策划"
      agent: planner
      skills: [content-plan]
      inputs:
        - type: user_input
          source: "用户提供的主题方向或关键词"
      outputs:
        - type: file
          path: "docs/plan/content-plan.md"
          format: markdown
      gate:
        type: manual
        criteria: "用户确认选题方向和大纲"
      transitions:
        on_success: research
        on_revision: planning
        on_blocked: halt

    - id: research
      name: "素材调研"
      agent: researcher
      skills: []
      inputs:
        - type: file
          source: "docs/plan/content-plan.md"
      outputs:
        - type: file
          path: "docs/research/research-notes.md"
          format: markdown
      transitions:
        on_success: writing
        on_revision: research
        on_blocked: halt

    - id: writing
      name: "内容撰写"
      agent: writer
      skills: [content-gen]
      inputs:
        - type: file
          source: "docs/plan/content-plan.md"
        - type: file
          source: "docs/research/research-notes.md"
      outputs:
        - type: file
          path: "docs/draft/article-draft.md"
          format: markdown
      transitions:
        on_success: editing
        on_revision: writing
        on_blocked: halt

    - id: editing
      name: "内容编辑"
      agent: editor
      skills: [content-edit]
      inputs:
        - type: file
          source: "docs/draft/article-draft.md"
        - type: file
          source: "docs/plan/content-plan.md"
      outputs:
        - type: file
          path: "docs/final/article-final.md"
          format: markdown
      gate:
        type: review
        criteria: "文章结构完整、逻辑通顺、无明显错误"
      transitions:
        on_success: publishing
        on_revision: writing
        on_blocked: halt

    - id: publishing
      name: "排版发布"
      agent: publisher
      skills: [format-convert]
      inputs:
        - type: file
          source: "docs/final/article-final.md"
      outputs:
        - type: file
          path: "docs/publish/article.html"
          format: html
      transitions:
        on_success: done
        on_blocked: halt

constants:
  MAX_QUESTIONS_PER_BATCH: 3
  MAX_REVISION_CYCLES: 3
  TARGET_WORD_COUNT: 2000
  STYLE_GUIDE_PATH: "docs/config/style-guide.md"

features: {}
