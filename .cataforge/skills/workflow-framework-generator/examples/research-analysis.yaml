# Example Manifest: Research & Analysis Workflow
# Generated by: workflow-framework-generator
# Target: OpenCode

workflow_name: "技术调研分析工作流"
domain: research-analysis
platform_id: opencode
project_name: tech-research-workflow

constraints:
  multi_agent: true
  tool_calls: true
  structured_output: true
  output_format: markdown

agents:
  - id: orchestrator
    name: "研究编排者"
    role: "管理调研流程，协调研究、分析和报告阶段"
    capabilities: [file_read, file_write, file_edit, file_glob, file_grep, shell_exec, agent_dispatch, user_question]
    max_turns: 150

  - id: researcher
    name: "调研员"
    role: "信息检索与资料收集"
    capabilities: [file_read, file_write, web_search, web_fetch]
    max_turns: 80

  - id: analyst
    name: "分析师"
    role: "数据分析与洞察提取"
    capabilities: [file_read, file_write, file_edit, shell_exec]
    max_turns: 80

  - id: reporter
    name: "报告撰写"
    role: "综合分析结果，生成结构化研究报告"
    capabilities: [file_read, file_write, file_edit]
    max_turns: 100

skills:
  - id: literature-search
    name: "文献检索"
    type: instructional
    description: "基于关键词和来源策略进行文献/资料检索与筛选"
    used_by: [researcher]

  - id: data-analysis
    name: "数据分析"
    type: instructional
    description: "对收集的数据进行结构化分析和模式识别"
    used_by: [analyst]

  - id: report-gen
    name: "报告生成"
    type: instructional
    description: "将分析结果综合为结构化研究报告"
    used_by: [reporter]

workflow:
  id: tech-research
  phases:
    - id: scope-definition
      name: "范围定义"
      agent: orchestrator
      skills: []
      inputs:
        - type: user_input
          source: "研究主题、目标问题、约束条件"
      outputs:
        - type: file
          path: "docs/scope/research-plan.md"
          format: markdown
      gate:
        type: manual
        criteria: "用户确认研究范围和关键问题"
      transitions:
        on_success: information-gathering
        on_revision: scope-definition
        on_blocked: halt

    - id: information-gathering
      name: "信息收集"
      agent: researcher
      skills: [literature-search]
      inputs:
        - type: file
          source: "docs/scope/research-plan.md"
      outputs:
        - type: file
          path: "docs/sources/literature-notes.md"
          format: markdown
      transitions:
        on_success: analysis
        on_revision: information-gathering
        on_blocked: halt

    - id: analysis
      name: "分析"
      agent: analyst
      skills: [data-analysis]
      inputs:
        - type: file
          source: "docs/sources/literature-notes.md"
        - type: file
          source: "docs/scope/research-plan.md"
      outputs:
        - type: file
          path: "docs/analysis/analysis-report.md"
          format: markdown
      transitions:
        on_success: reporting
        on_revision: information-gathering
        on_blocked: halt

    - id: reporting
      name: "报告撰写"
      agent: reporter
      skills: [report-gen]
      inputs:
        - type: file
          source: "docs/analysis/analysis-report.md"
        - type: file
          source: "docs/sources/literature-notes.md"
        - type: file
          source: "docs/scope/research-plan.md"
      outputs:
        - type: file
          path: "docs/final/research-report.md"
          format: markdown
      gate:
        type: review
        criteria: "报告覆盖所有研究问题，论证有据"
      transitions:
        on_success: done
        on_revision: analysis
        on_blocked: halt

constants:
  MAX_QUESTIONS_PER_BATCH: 3
  MAX_REVISION_CYCLES: 3
  MAX_SEARCH_ITERATIONS: 5

features: {}
