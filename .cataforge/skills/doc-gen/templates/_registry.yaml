# Template Registry — 模板注册表（单一事实来源）
# 所有模板的元数据定义。doc-gen、doc-check、load_section 均从此文件派生映射。
version: "1"

templates:
  # ============================================================
  # standard 模式 — 主卷
  # ============================================================
  prd:
    path: standard/prd.md
    doc_type: prd
    mode: standard
    role: main
    author_agent: product-manager
    upstream_deps: []
    volumes: [prd-volume]

  arch:
    path: standard/arch.md
    doc_type: arch
    mode: standard
    role: main
    author_agent: architect
    upstream_deps: [prd]
    volumes: [arch-modules, arch-api, arch-data]

  ui-spec:
    path: standard/ui-spec.md
    doc_type: ui-spec
    mode: standard
    role: main
    author_agent: ui-designer
    upstream_deps: [prd, arch]
    volumes: [ui-spec-components, ui-spec-pages]

  dev-plan:
    path: standard/dev-plan.md
    doc_type: dev-plan
    mode: standard
    role: main
    author_agent: tech-lead
    upstream_deps: [arch, ui-spec]
    volumes: [dev-plan-sprint]

  test-report:
    path: standard/test-report.md
    doc_type: test-report
    mode: standard
    role: main
    author_agent: qa-engineer
    upstream_deps: [dev-plan]
    volumes: []

  deploy-spec:
    path: standard/deploy-spec.md
    doc_type: deploy-spec
    mode: standard
    role: main
    author_agent: devops
    upstream_deps: [arch]
    volumes: []

  # ============================================================
  # standard 模式 — 分卷
  # ============================================================
  prd-volume:
    path: volumes/prd-volume.md
    doc_type: prd
    mode: standard
    role: volume
    volume_type: features
    split_from: prd
    author_agent: product-manager

  arch-modules:
    path: volumes/arch-modules.md
    doc_type: arch
    mode: standard
    role: volume
    volume_type: modules
    split_from: arch
    author_agent: architect

  arch-api:
    path: volumes/arch-api.md
    doc_type: arch
    mode: standard
    role: volume
    volume_type: api
    split_from: arch
    author_agent: architect

  arch-data:
    path: volumes/arch-data.md
    doc_type: arch
    mode: standard
    role: volume
    volume_type: data
    split_from: arch
    author_agent: architect

  dev-plan-sprint:
    path: volumes/dev-plan-sprint.md
    doc_type: dev-plan
    mode: standard
    role: volume
    volume_type: sprint
    split_from: dev-plan
    author_agent: tech-lead

  ui-spec-components:
    path: volumes/ui-spec-components.md
    doc_type: ui-spec
    mode: standard
    role: volume
    volume_type: components
    split_from: ui-spec
    author_agent: ui-designer

  ui-spec-pages:
    path: volumes/ui-spec-pages.md
    doc_type: ui-spec
    mode: standard
    role: volume
    volume_type: pages
    split_from: ui-spec
    author_agent: ui-designer

  ui-spec-theme:
    path: volumes/ui-spec-theme.md
    doc_type: ui-spec
    mode: standard
    role: volume
    volume_type: theme
    split_from: ui-spec
    author_agent: ui-designer

  # ============================================================
  # agile-lite 模式
  # ============================================================
  prd-lite:
    path: lite/prd-lite.md
    doc_type: prd
    mode: agile-lite
    role: main
    author_agent: product-manager
    upstream_deps: []

  arch-lite:
    path: lite/arch-lite.md
    doc_type: arch
    mode: agile-lite
    role: main
    author_agent: architect
    upstream_deps: [prd-lite]

  ui-spec-lite:
    path: lite/ui-spec-lite.md
    doc_type: ui-spec
    mode: agile-lite
    role: main
    author_agent: ui-designer
    upstream_deps: [prd-lite]

  dev-plan-lite:
    path: lite/dev-plan-lite.md
    doc_type: dev-plan
    mode: agile-lite
    role: main
    author_agent: tech-lead
    upstream_deps: [arch-lite]

  # ============================================================
  # agile-prototype 模式
  # ============================================================
  brief:
    path: prototype/brief.md
    doc_type: brief
    mode: agile-prototype
    role: main
    author_agent: product-manager
    upstream_deps: []

  # ============================================================
  # 工具文档（模式无关）
  # ============================================================
  research-note:
    path: utility/research-note.md
    doc_type: research
    mode: any
    role: main
    author_agent: any
    upstream_deps: []

  changelog:
    path: utility/changelog.md
    doc_type: changelog
    mode: any
    role: main
    author_agent: devops
    upstream_deps: []

  sprint-review:
    path: utility/sprint-review.md
    doc_type: sprint-review
    mode: any
    role: main
    author_agent: reviewer
    upstream_deps: [dev-plan, arch]
