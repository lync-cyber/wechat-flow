name: Visual Regression (Sampled)

on:
  pull_request:
    branches: [main]

jobs:
  visual-sampled:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Trust workspace (container git ownership)
        run: git config --global --add safe.directory '*'

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run sampled variant matrix
        run: pnpm playwright test e2e/visual/variant-matrix.spec.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-sampled-report
          path: playwright-report/
