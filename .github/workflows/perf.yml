name: Perf Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run performance benchmark
        # PERF_TYPING_P95_MS / PERF_THEME_P95_MS are hardware-calibration env vars.
        # Defaults (50ms / 200ms) are the PRD §3.1 targets.
        # CI values below are relaxed for GitHub-hosted runner variance —
        # adjust if the runner hardware profile changes.
        env:
          PERF_TYPING_P95_MS: 500
          PERF_THEME_P95_MS: 2000
        run: pnpm bench

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-report
          path: perf-report.json
