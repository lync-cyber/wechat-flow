name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Turborepo 远程缓存（arch#§7.4 缓存策略）：secrets 配置时命中远程缓存，缺失时 turbo 优雅回落本地 .turbo。
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # arch#§7.4 任务图 lint → typecheck → unit-test 合并执行（单次 install，turbo 内部按 turbo.json 依赖图排序）：
  # pnpm lint（biome）/ pnpm typecheck（turbo per-package tsc + tests/tsconfig）/
  # pnpm test:coverage（根 vitest：单测 + ruleset-fixtures + 主题 9 维守卫 + 覆盖率阈值）。
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Turbo 缓存
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - name: Coverage 报告评论（仅 PR）
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  # 跨运行时一致性：renderMarkdown 在 Node / Web Worker / Edge(workerd) / 浏览器主线程
  # 四运行时对同一输入产出字节一致的 HTML（SHA-256 相同）。与 quality-gate 并行。
  cross-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 安装 Playwright chromium（浏览器 / Worker target）
        run: pnpm exec playwright install --with-deps chromium
      - name: 跨运行时一致性测试（node + browser + worker + edge）
        run: pnpm test:cross-runtime

  # 架构与安全守卫：全图依赖守卫 + 模块边界守卫 + 全 git 历史密钥扫描
  # 与 quality-gate 并行。规则与渐进式落地见 GUARDS.md。
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 架构守卫（依赖图：分层方向 / 禁循环）
        # 观察期可改为：env DEPCRUISE_WARN_ONLY=1 pnpm guard:arch（只报告不阻断）
        run: pnpm guard:arch
      - name: 模块边界守卫（公共 API 边界 / 禁跨包深引用）
        run: pnpm guard:boundaries
      - name: 密钥扫描（全 git 历史，深度兜底）
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
