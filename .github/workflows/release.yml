name: Release

# Triggered by pushing a `v{major}.{minor}.{patch}` tag (arch#§7.5 Git 约定).
# Reuses ci.yml's quality-gate as a hard prerequisite via workflow_run gating —
# a release tag pushed on a red main is refused rather than silently shipped.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  verify-tag-on-green-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag must point at a commit on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main || \
            (echo "::error::release tag ${GITHUB_REF_NAME} is not on main — refusing release" && exit 1)

  quality-gate:
    needs: verify-tag-on-green-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage

  publish-npm-packages:
    needs: quality-gate
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Publish workspace:* packages to npm
        # packages/{core,contracts,plugin-api,ruleset,blocks,marks,palette,zh-typo,themes/*}
        # package.json `version` fields must be bumped to match the tag before tagging
        # (arch#§7.5); this job does not auto-bump versions (see deploy-spec §1 决策记录).
        run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-container-images:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [relay, mcp-server, job-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wechat-flow-${{ matrix.component }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/wechat-flow-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  build-editor-spa:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wechat-flow/editor build
        env:
          VITE_RELAY_BASE_URL: ${{ vars.EDITOR_PROD_RELAY_BASE_URL }}
      - uses: actions/upload-artifact@v4
        with:
          name: editor-dist
          path: apps/editor/dist/
          retention-days: 90

  github-release:
    needs: [publish-npm-packages, build-container-images, build-editor-spa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: editor-dist
          path: editor-dist
      - name: Archive editor SPA artifact
        run: tar -czf editor-dist.tar.gz -C editor-dist .
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: editor-dist.tar.gz
