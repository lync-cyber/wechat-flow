# Local / staging minimal stack (arch#§6.2 部署单元拓扑).
# Editor SPA is not included — it is a static build served by a CDN/Nginx/`vite preview`,
# not a long-running container (see deploy-spec §1 构建流程).
#
# Usage:
#   cp .env.example .env.dev   # fill in real secrets, never commit
#   docker compose --env-file .env.dev up -d redis relay job-worker
#   docker compose --env-file .env.dev --profile mcp up -d mcp-server

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [backend]

  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      REDIS_URL: redis://redis:6379
      IMAGE_HOST: ${IMAGE_HOST:-local}
      LOCAL_BASE_DIR: ${LOCAL_BASE_DIR:-/data/uploads}
      LOCAL_PUBLIC_BASE_URL: ${LOCAL_PUBLIC_BASE_URL:-http://localhost:8787/uploads}
      EDITOR_JWT_SECRET: ${EDITOR_JWT_SECRET:?EDITOR_JWT_SECRET is required}
      EDITOR_ALLOWED_ORIGINS: ${EDITOR_ALLOWED_ORIGINS:-http://localhost:5173}
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER is required}
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY:-}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY:-}
      QINIU_BUCKET: ${QINIU_BUCKET:-}
      QINIU_DOMAIN: ${QINIU_DOMAIN:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_REGION: ${OSS_REGION:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}
      SMMS_TOKEN: ${SMMS_TOKEN:-}
      CUSTOM_UPLOAD_ENDPOINT: ${CUSTOM_UPLOAD_ENDPOINT:-}
      CUSTOM_UPLOAD_TOKEN: ${CUSTOM_UPLOAD_TOKEN:-}
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [backend]

  job-worker:
    build:
      context: .
      dockerfile: apps/job-worker/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      RENDER_POOL_SIZE: ${RENDER_POOL_SIZE:-2}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    networks: [backend]

  # KNOWN GAP (deploy-spec §2): startHttpTransport() boots with makeNotImplementedJobsClient()
  # by default — job-dependent tools (export_long_image/export_cover/upload_to_wechat_asset)
  # return E_NOT_IMPLEMENTED until a real JobsClient wired to relay is injected via ServerDeps
  # (T-125 backlog). render_markdown/lint_markdown/list_themes/describe_* tools work standalone.
  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    profiles: ["mcp"]
    ports:
      - "8788:8788"
    environment:
      PORT: "8788"
    depends_on:
      relay:
        condition: service_healthy
    # No /health route on http-sse.ts (only POST /mcp/tools/:tool) — TCP-connect
    # probe, mirrors the Dockerfile HEALTHCHECK (deploy-spec §7 已知差距).
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:net').createConnection(Number(process.env.PORT||8788),'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',function(){process.exit(1)})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [backend]

networks:
  backend:
    driver: bridge

volumes:
  redis-data:
  uploads-data:
